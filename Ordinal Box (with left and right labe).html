<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Correct Box</title>
<style>
  body {
    font-family: "Poppins", sans-serif;
    text-align: center;
    background-color: #f8f9fa;
    margin: 0;
    padding: 0;
  }

  .screen {
    display: none;
    padding: 40px;
  }

  .active {
    display: block;
  }

  h1 {
    font-size: 2.5em;
    color: #333;
  }

  button {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 12px 25px;
    font-size: 1em;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background-color: #0056b3;
  }

  .boxes {
    display: flex;
    justify-content: center;
    margin: 30px 0;
  }

  .box {
    width: 60px;
    height: 60px;
    margin: 0 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    font-size: 1.2em;
  }

  .labels {
    display: flex;
    justify-content: space-between;
    width: 640px;
    margin: 0 auto;
    font-weight: bold;
  }

  .feedback {
    font-size: 1.2em;
    margin-top: 15px;
  }

  #score {
    margin-top: 20px;
    font-weight: bold;
  }

  input {
    padding: 8px;
    width: 120px;
    font-size: 1em;
    text-align: center;
    margin-top: 10px;
  }

  img.title-image, img.result-image {
    width: 300px;
    max-width: 80%;
    margin-bottom: 20px;
    border-radius: 20px;
  }

  img.result-image {
    margin-top: 20px;
  }

  /* Confetti animation */
  .confetti {
    position: fixed;
    width: 10px;
    height: 10px;
    background-color: red;
    animation: fall 2s linear infinite;
  }

  @keyframes fall {
    0% {transform: translateY(0);}
    100% {transform: translateY(100vh);}
  }
</style>
</head>
<body>

<!-- Page 1: Title -->
<div id="title-screen" class="screen active">
  <img src="Untitled design.png" alt="Happy Boxes" class="title-image">
  <h1>The Correct Box</h1>
  <button onclick="showScreen('instructions-screen')">Start</button>
</div>

<!-- Page 2: Instructions -->
<div id="instructions-screen" class="screen">
  <h2>Instructions</h2>
  <p>Read the question and enter the correct answer.</p>
  <button onclick="startGame()">Next</button>
</div>

<!-- Page 3: Game -->
<div id="game-screen" class="screen">
  <h2 id="question"></h2>
  <div class="boxes" id="boxes"></div>
  <div class="labels"><span>Left</span><span>Right</span></div>
  <p>The answer is Box <input type="number" id="answerInput" min="1" max="10"></p>
  <button onclick="checkAnswer()">Submit</button>
  <div class="feedback" id="feedback"></div>
  <p id="score"></p>
</div>

<!-- Page 4: Results -->
<div id="result-screen" class="screen">
  <img src="Well Done.png" alt="You Did It!" class="result-image">
  <h2>You Did It!</h2>
  <p>Your total score is: <span id="finalScore"></span>/10</p>
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
  const colors = [
    "#e74c3c","#f39c12","#f1c40f","#2ecc71","#1abc9c",
    "#3498db","#9b59b6","#e67e22","#2c3e50","#7f8c8d"
  ];

  const allQuestions = [
    {text: "Which box is 1st from the left?", answer: 1},
    {text: "Which box is 2nd from the right?", answer: 9},
    {text: "Which box is 3rd from the right?", answer: 8},
    {text: "Which box is 4th from the left?", answer: 4},
    {text: "Which box is 6th from the right?", answer: 5},
    {text: "Which box is 7th from the left?", answer: 7},
    {text: "Which box is 8th from the left?", answer: 8},
    {text: "Which box is 9th from the right?", answer: 2},
    {text: "Which box is 1st from the right?", answer: 10},
    {text: "Which box is 3rd from the left?", answer: 3}
  ];

  let questions = [];
  let currentQuestion = 0;
  let score = 0;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame() {
    questions = [...allQuestions].sort(() => Math.random() - 0.5);
    currentQuestion = 0;
    score = 0;
    showScreen('game-screen');
    loadQuestion();
  }

  function loadQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('question').textContent = `Question ${currentQuestion + 1}: ${q.text}`;
    document.getElementById('boxes').innerHTML = "";
    colors.forEach((color, i) => {
      const box = document.createElement("div");
      box.className = "box";
      box.style.backgroundColor = color;
      box.textContent = i + 1;
      document.getElementById("boxes").appendChild(box);
    });
    document.getElementById('answerInput').value = "";
    document.getElementById('feedback').textContent = "";
    document.getElementById('score').textContent = `Score: ${score}`;
  }

  function checkAnswer() {
    const userAnswer = parseInt(document.getElementById('answerInput').value);
    const correctAnswer = questions[currentQuestion].answer;
    const feedback = document.getElementById('feedback');
    
    if (userAnswer === correctAnswer) {
      feedback.textContent = "✅ Correct!";
      score++;
      showConfetti();
      setTimeout(nextQuestion, 1500);
    } else {
      feedback.textContent = "❌ Try Again!";
    }
    document.getElementById('score').textContent = `Score: ${score}`;
  }

  function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) {
      loadQuestion();
    } else {
      showResults();
    }
  }

  function showResults() {
    showScreen('result-screen');
    document.getElementById('finalScore').textContent = score;
  }

  function showConfetti() {
    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.className = "confetti";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDuration = 2 + Math.random() * 3 + "s";
      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 3000);
    }
  }
</script>

</body>
</html>
